<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Universal Screens — UNI·SIM</title>
  <meta name="description" content="Use your phone as a clicker, trackpad, second screen, or remote control for your PC." />
  <style>
    :root { --brand: #e05504; --ink: #0f172a; --muted: #64748b; --line: #e2e8f0; --bg: #f8fafc; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font: 16px/1.5 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 24px;
    }
    /* UNI·SIM brand strip */
    .bar { position: fixed; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, transparent, var(--brand), transparent); }
    .card { width: 100%; max-width: 420px; text-align: center; }
    .icon { width: 96px; height: 96px; border-radius: 22px; box-shadow: 0 8px 24px -6px rgba(15,23,42,.25); }
    h1 { font-size: 28px; margin: 18px 0 2px; }
    .tag { color: var(--muted); margin: 0 0 22px; }
    .stores { display: flex; flex-direction: column; gap: 10px; }
    a.btn {
      display: block; padding: 14px 18px; border-radius: 12px; text-decoration: none; font-weight: 600;
      background: var(--brand); color: #fff;
    }
    a.btn.secondary { background: #fff; color: var(--ink); border: 1px solid var(--line); }
    .hint { color: var(--muted); font-size: 13px; margin-top: 18px; }
    .modes { list-style: none; padding: 0; margin: 24px 0 0; color: var(--muted); font-size: 14px; }
    .modes li { padding: 4px 0; }
  </style>
</head>
<body>
  <div class="bar" aria-hidden="true"></div>
  <main class="card">
    <img class="icon" src="icon.png" alt="Universal Screens" />
    <h1>Universal Screens</h1>
    <p class="tag">Your phone as a clicker, trackpad, second screen &amp; remote — for your PC.</p>

    <div class="stores" id="stores"></div>

    <p class="hint" id="hint"></p>

    <ul class="modes">
      <li>📽️ Clicker — drive slides with previews</li>
      <li>🖱️ Trackpad — move, tap, scroll</li>
      <li>🪞 Mirror &amp; Remote control — see and control your PC</li>
      <li>🖥️ Second screen — an extra display</li>
    </ul>
  </main>

  <script>
    // TODO: replace with the real store / download URLs once published.
    var PLAY_URL = "https://play.google.com/store/apps/details?id=com.universalsim.extender";
    var APPSTORE_URL = "https://apps.apple.com/app/universal-screens/id000000000";
    var HOST_DOWNLOAD_URL = "https://opensource.unisim.co.uk/screens/download"; // Windows host

    var ua = navigator.userAgent || "";
    var isAndroid = /Android/i.test(ua);
    var isIOS = /iPhone|iPad|iPod/i.test(ua);
    var stores = document.getElementById("stores");
    var hint = document.getElementById("hint");

    function btn(href, label, secondary) {
      var a = document.createElement("a");
      a.href = href; a.className = "btn" + (secondary ? " secondary" : "");
      a.textContent = label; return a;
    }

    if (isAndroid) {
      stores.appendChild(btn(PLAY_URL, "Get it on Google Play"));
      hint.textContent = "Already installed? This link opens the app automatically. Then tap Scan and point at the host's Step 2 QR.";
    } else if (isIOS) {
      stores.appendChild(btn(APPSTORE_URL, "Download on the App Store"));
      hint.textContent = "Already installed? This link opens the app automatically. Then tap Scan and point at the host's Step 2 QR.";
    } else {
      stores.appendChild(btn(HOST_DOWNLOAD_URL, "Download the PC host (Windows)"));
      stores.appendChild(btn(PLAY_URL, "Phone app — Google Play", true));
      stores.appendChild(btn(APPSTORE_URL, "Phone app — App Store", true));
      hint.textContent = "Install the host on your PC, then get the phone app and scan to connect.";
    }
  </script>
</body>
</html>
